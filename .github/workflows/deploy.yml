name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Catalog Service
        run: |
          docker build -t duartee/catalog-service:latest ./services/catalog-service

      - name: Build Order Service
        run: |
          docker build -t duartee/order-service:latest ./services/order-service

      - name: Build Notification Service
        run: |
          docker build -t duartee/notification-service:latest ./services/notification-service

      - name: Push Images
        run: |
          docker push duartee/catalog-service:latest
          docker push duartee/order-service:latest
          docker push duartee/notification-service:latest

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem


      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@${{ secrets.EC2_HOST }} << EOF
          
          docker pull duartee/catalog-service:latest
          docker pull duartee/order-service:latest
          docker pull duartee/notification-service:latest
          
          docker rm -f catalog-service || true
          docker rm -f order-service || true
          docker rm -f notification-service || true
          
          docker run -d \
            --name catalog-service \
            -p 8081:8081 \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            duartee/catalog-service:latest
          
          docker run -d \
            --name order-service \
            -p 8082:8082 \
            duartee/order-service:latest
          
          docker run -d \
            --name notification-service \
            duartee/notification-service:latest
          
          EOF
