services:

  catalog-service:
    image: duartee/catalog-service:latest
    container_name: catalog-service
    restart: unless-stopped
    ports:
      - "8081:8081"

  order-service:
    image: duartee/order-service:latest
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"

  notification-service:
    image: duartee/notification-service:latest
    container_name: notification-service
    restart: unless-stopped